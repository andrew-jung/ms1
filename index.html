    }
    header {

    }
    header h1 {

      font-weight: bold;

    }

    }
    .tab-btn {

      border: 1px solid #cccccc;
      color: #333333;
      font-weight: bold;
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      cursor: pointer;
      border-radius: 4px;
    }
    .tab-btn.active {
      background-color: #ffffff;
      border-bottom-color: transparent;
      color: #000000;
      border-radius: 4px 4px 0 0;
    }
    .container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .page {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
    }
    .page.active {
      display: flex;
      flex-direction: column;
    }
    .leaderboard-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      background-color: #ffffff;
      border: 1px solid #cccccc;
    }
    .leaderboard-table th {
      padding: 0.75rem 1rem;
      border-bottom: 2px solid #cccccc;
      font-size: 0.8rem;
      font-weight: bold;
      background-color: #f5f5f5;
    }
    .leaderboard-table td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #eeeeee;
      font-size: 0.85rem;
    }
    .leaderboard-table tr:hover {
      background-color: #fcfcfc;
    }
    .player-name-link {
      font-weight: bold;
      color: #0055aa;
      text-decoration: none;
      cursor: pointer;
    }
    .back-btn {
      align-self: flex-start;
      background-color: #ffffff;
      border: 1px solid #cccccc;
      padding: 0.4rem 0.8rem;
      border-radius: 4px;
      font-size: 0.8rem;
      cursor: pointer;
      margin-bottom: 1.5rem;
    }
    .profile-header {
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #cccccc;
      padding-bottom: 1rem;
    }
    .profile-header h2 {
      margin: 0 0 0.5rem 0;
      font-size: 1.75rem;
    }
    .summary-grid {
      display: flex;
      gap: 2rem;
      font-size: 0.85rem;
    }
    .summary-grid span {
      background-color: #f5f5f5;
      padding: 0.2rem 0.5rem;
      border: 1px solid #e0e0e0;
      border-radius: 3px;
    }
    .tournament-card {
      border: 1px solid #cccccc;
      border-radius: 4px;
      margin-bottom: 0.75rem;
      overflow: hidden;
      background-color: #ffffff;
    }
    .tournament-header {
      width: 100%;
      padding: 0.75rem 1rem;
      background-color: #f9f9f9;
      border: none;
      text-align: left;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .tournament-meta {
      display: flex;
      gap: 1rem;
      font-size: 0.8rem;
      font-weight: normal;
    }
    .placement-badge {
      background-color: #e5e7eb;
      color: #374151;
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-weight: bold;
    }
    .tournament-body {
      border-top: 1px solid #dddddd;
      display: none;
      background-color: #ffffff;
    }
    .tournament-card.open .tournament-body {
      display: block;
    }
    .match-row {
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.8rem;
      border-bottom: 1px solid #eeeeee;
    }
    .match-row:last-child {
      border-bottom: none;
    }
    .match-result {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .result-indicator {
      font-size: 0.65rem;
      font-weight: bold;
      padding: 0.1rem 0.3rem;
      border-radius: 2px;
      text-transform: uppercase;
      width: 44px;
      text-align: center;
    }
    .result-indicator.win {
      background-color: #d1fae5;
      color: #065f46;
    }
    .result-indicator.loss {
      background-color: #fee2e2;
      color: #991b1b;
    }
    .opponent-name {
      font-weight: bold;
    }

      font-family: monospace;

    }
    .match-round {
      color: #666666;
    }
    .character-text {

      font-size: 0.95rem;
    }

      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #dddddd;
      padding: 0.5rem;
      background-color: #fafafa;
    }

      background-color: #ffffff;
      border: 1px solid #cccccc;
      color: #333333;
      padding: 0.3rem 0.5rem;
      border-radius: 3px;
      font-size: 0.75rem;
      cursor: pointer;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;

      border-color: #0284c7;
      color: #0369a1;
    }

      gap: 0.5rem;
      margin-top: 0.75rem;
    }

      background-color: #ffffff;
      border: 1px solid #cccccc;
      color: #333333;
      font-size: 0.7rem;
      font-weight: bold;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      border-radius: 3px;
    }

      text-align: center;
      color: #666666;
      font-size: 0.9rem;

      border: 1px solid #cccccc;
    }

      border-collapse: collapse;
      text-align: left;
      background-color: #ffffff;

      border-bottom: 2px solid #cccccc;
      font-size: 0.85rem;
      background-color: #f5f5f5;

      border-bottom: 1px solid #eeeeee;
      font-size: 0.8rem;

    function getCleanScore(displayScore, myName, isWin) {
      if (!displayScore) return "";
      if (displayScore.toUpperCase().includes("DQ")) return "DQ";
      var parts = displayScore.split(" - ");
      if (parts.length === 2) {
        var num1Match = parts[0].trim().match(/\d+$/);
        var num2Match = parts[1].trim().match(/\d+$/);
        if (num1Match && num2Match) {
          var num1 = parseInt(num1Match[0], 10);
          var num2 = parseInt(num2Match[0], 10);
          var p1Lower = parts[0].toLowerCase();
          var myLower = myName.toLowerCase();
          if (p1Lower.indexOf(myLower) !== -1) {
            return num1 + "-" + num2;
          } else if (parts[1].toLowerCase().indexOf(myLower) !== -1) {
            return num2 + "-" + num1;
          } else {
            var high = Math.max(num1, num2);
            var low = Math.min(num1, num2);
            return isWin ? (high + "-" + low) : (low + "-" + high);
          }
        }
      }
      var regexMatch = displayScore.match(/^\s*(\d+)\s*-\s*(\d+)\s*$/);
      if (regexMatch) {
        var num1 = parseInt(regexMatch[1], 10);
        var num2 = parseInt(regexMatch[2], 10);
        var high = Math.max(num1, num2);
        var low = Math.min(num1, num2);
        return isWin ? (high + "-" + low) : (low + "-" + high);
      }
      return displayScore;
    }

    let selectedPlayerIds = [];

    function init() {
      renderLeaderboard(playersList);
      renderSelectorGrid();
      clearSelectedPlayers();
    }

    function switchPage(pageId) {
      document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
      
      if (pageId === 'leaderboard') {
        document.getElementById("leaderboardPage").classList.add("active");
        document.querySelector("[onclick=\"switchPage('leaderboard')\"]").classList.add("active");
      } else if (pageId === 'compare') {
        document.getElementById("comparePage").classList.add("active");
        document.querySelector("[onclick=\"switchPage('compare')\"]").classList.add("active");
        renderComparison();
      } else if (pageId === 'detail') {
        document.getElementById("playerDetailPage").classList.add("active");
      }
    }

    function renderLeaderboard(list) {
      const body = document.getElementById("leaderboardBody");
      body.innerHTML = "";
      list.forEach((name, idx) => {
        const p = dbProfiles[name];
        const tr = document.createElement("tr");
        tr.setAttribute("onclick", "viewPlayerDetail('" + name.replace(/'/g, "\'") + "')");
        
        tr.innerHTML = '<td>' + (idx + 1) + '</td>' +
                       '<td><span class="player-name-link">' + name + '</span></td>' +
                       '<td>' + p.eventCount + '</td>' +
                       '<td style="font-family: monospace; font-weight: bold; color: #16a34a;">' + p.prRecord + '</td>' +
                       '<td style="font-family: monospace; opacity: 0.7;">' + p.overallRecord + '</td>';
        body.appendChild(tr);
      });
    }

    function filterLeaderboard() {
      const q = document.getElementById("leaderboardSearch").value.toLowerCase();
      const filtered = playersList.filter(p => p.toLowerCase().includes(q));
      renderLeaderboard(filtered);
    }

    function viewPlayerDetail(name) {
      const p = dbProfiles[name];
      const container = document.getElementById("playerDetailContainer");
      
      let html = '<div class="profile-header">';
      html += '<h2>' + name + '</h2>';
      html += '<div class="summary-grid">';
      html += '<span>Tournaments Entered: <strong>' + p.eventCount + '</strong></span>';
      html += '<span>PR Record: <strong>' + p.prRecord + '</strong></span>';
      html += '<span>Overall Record: <strong>' + p.overallRecord + '</strong></span>';
      html += '</div>';
      html += '</div>';

      p.tournaments.forEach((t, idx) => {
        html += '<div class="tournament-card" id="t-card-' + idx + '">';
        html += '<button class="tournament-header" onclick="toggleTournament(' + idx + ')">';
        html += '<span><a href="' + t.url + '" target="_blank" onclick="event.stopPropagation()" style="color: #0055aa; text-decoration: underline;">' + t.tournamentName + '</a>' + (t.date ? ' <span style="font-size: 0.75rem; color: #888888; font-weight: normal; margin-left: 0.5rem;">(' + t.date + ')</span>' : '') + '</span>';
        html += '<div class="tournament-meta">';
        html += '<span>Record: ' + t.record + '</span>';
        html += '<span class="placement-badge">' + t.placement + '</span>';
        html += '</div>';
        html += '</button>';
        html += '<div class="tournament-body">';

        t.sets.forEach(s => {
          const resClass = s.isWin ? 'win' : 'loss';
          const scoreDisplay = s.isDQ ? '(DQ)' : '(' + getCleanScore(s.score, name, s.isWin) + ')';
          html += '<div class="match-row">';
          html += '<div class="match-result">';
          html += '<span class="result-indicator ' + resClass + '">' + (s.isWin ? 'win' : 'loss') + '</span>';
          html += '<div>';
          html += '<span class="opponent-name">vs ' + s.oppName + '</span>';
          html += '<span class="score-text">' + scoreDisplay + '</span>';
          if (s.char) {
            html += '<div class="character-text">' + s.char + '</div>';
          }
          html += '</div>';
          html += '</div>';
          html += '<div class="match-round">' + s.round + '</div>';
          html += '</div>';
        });

        html += '</div>';
        html += '</div>';
      });

      container.innerHTML = html;
      switchPage('detail');
    }

    function toggleTournament(idx) {
      const card = document.getElementById("t-card-" + idx);
      if (card) card.classList.toggle("open");
    }

    function renderSelectorGrid() {
      const grid = document.getElementById("selectorGrid");
      grid.innerHTML = "";
      playersList.forEach(name => {
        const btn = document.createElement("button");
        btn.id = "sel-btn-" + name;
        btn.className = "selector-btn";
        btn.setAttribute("onclick", "toggleSelectPlayer('" + name.replace(/'/g, "\'") + "')");
        btn.innerText = name;
        grid.appendChild(btn);
      });
    }

    function toggleSelectPlayer(name) {
      const idx = selectedPlayerIds.indexOf(name);
      if (idx !== -1) {
        selectedPlayerIds.splice(idx, 1);
        document.getElementById("sel-btn-" + name).classList.remove("selected");
      } else {
        selectedPlayerIds.push(name);
        document.getElementById("sel-btn-" + name).classList.add("selected");
      }
      renderComparison();
    }

    function clearSelectedPlayers() {
      selectedPlayerIds = [];
      document.querySelectorAll(".selector-btn").forEach(b => b.classList.remove("selected"));
      renderComparison();
    }

    function selectDefaultPlayers() {
      clearSelectedPlayers();
      selectedPlayerIds = [playersList[0], playersList[1]].filter(Boolean);
      selectedPlayerIds.forEach(name => {
        const btn = document.getElementById("sel-btn-" + name);
        if (btn) btn.classList.add("selected");
      });
      renderComparison();
    }

    function renderComparison() {
      const container = document.getElementById("compareDisplayContainer");
      container.innerHTML = "";

      if (selectedPlayerIds.length < 2) {
        container.innerHTML = '<div class="compare-empty"><h4>Select at least 2 players</h4>Toggle players from the selection area above to compare.</div>';
        return;
      }

      const comparePlayers = [...selectedPlayerIds].sort((a,b) => playersList.indexOf(a) - playersList.indexOf(b));
      
      let html = '';

      html += '<div class="comparison-table-wrapper">';
      html += '<table class="compare-table">';
      html += '<thead><tr>';
      html += '<th>Stat</th>';
      comparePlayers.forEach(name => {
        html += '<th style="color: #0055aa;">' + name + '</th>';
      });
      html += '</tr></thead>';
      html += '<tbody>';

      html += '<tr><td>Tournaments Played</td>';
      comparePlayers.forEach(name => {
        html += '<td>' + dbProfiles[name].eventCount + '</td>';
      });
      html += '</tr>';

      html += '<tr><td>PR Record (excl. DQ)</td>';
      comparePlayers.forEach(name => {
        html += '<td style="font-family: monospace; font-weight: bold; color: #16a34a;">' + dbProfiles[name].prRecord + '</td>';
      });
      html += '</tr>';

      html += '<tr><td>Overall Record (excl. DQ)</td>';
      comparePlayers.forEach(name => {
        html += '<td style="font-family: monospace; opacity: 0.8;">' + dbProfiles[name].overallRecord + '</td>';
      });
      html += '</tr>';

      html += '<tr><td>Best Wins</td>';
      comparePlayers.forEach(name => {
        const wins = getBestWins(name);
        html += '<td style="color: #16a34a; font-size: 0.75rem;">' + wins.join(", ") + '</td>';
      });
      html += '</tr>';

      html += '<tr><td>Worst Losses</td>';
      comparePlayers.forEach(name => {
        const losses = getWorstLosses(name);
        html += '<td style="color: #991b1b; font-size: 0.75rem;">' + losses.join(", ") + '</td>';
      });
      html += '</tr>';

      html += '</tbody></table></div>';

      if (comparePlayers.length === 2) {
        const p1 = comparePlayers[0];
        const p2 = comparePlayers[1];
        const rec = dbH2H[p1]?.[p2] || { setWins: 0, setLosses: 0, matches: [] };

        html += '<div class="compare-card-section">';
        html += '<h3>Direct Matchup Results</h3>';
        html += '<p>Direct sets between ' + p1 + ' and ' + p2 + ' (excluding DQs: ' + rec.setWins + '-' + rec.setLosses + ')</p>';
        
        const nonDqMatches = rec.matches.filter(m => !m.isDQ);
        if (nonDqMatches.length === 0) {
          html += '<div style="color: #666666; font-size: 0.8rem; text-align: center; padding: 1rem;">No direct matches played.</div>';
        } else {
          nonDqMatches.forEach(m => {
            const isP1Win = m.winnerName === p1;
            const resClass = isP1Win ? 'win' : 'loss';
            let charLabel = "";
            if (m.characters) {
              const char1 = m.characters[p1];
              const char2 = m.characters[p2];
              if (char1 || char2) charLabel = ' <span class="character-text">[' + (char1 || "?") + ' vs ' + (char2 || "?") + ']</span>';
            }
            html += '<div class="match-row">';
            html += '<div class="match-result">';
            html += '<span class="result-indicator ' + resClass + '">' + (isP1Win ? 'win' : 'loss') + '</span>';
            html += '<span class="opponent-name">' + m.winnerName + ' beat ' + m.loserName + ' (' + m.score + ')</span>' + charLabel;
            html += '</div>';
            html += '<div class="match-round">' + m.tournament + ' | ' + m.round + '</div>';
            html += '</div>';
          });
        }
        html += '</div>';

        const path1To2 = findShortestWinPath(p1, p2);
        const path2To1 = findShortestWinPath(p2, p1);

        if (path1To2 || path2To1) {
          html += '<div class="compare-card-section">';
          html += '<h3>Indirect Matchup Chains</h3>';
          
          if (path1To2) {
            html += '<div style="font-size: 0.75rem; font-weight: bold; color: #16a34a; margin-bottom: 0.3rem;">How ' + p1 + ' connects to ' + p2 + ':</div>';
            html += '<div class="path-box">' + formatPathHtml(path1To2) + '</div>';
          }
          if (path2To1) {
            html += '<div style="font-size: 0.75rem; font-weight: bold; color: #16a34a; margin-bottom: 0.3rem; margin-top: 0.75rem;">How ' + p2 + ' connects to ' + p1 + ':</div>';
            html += '<div class="path-box">' + formatPathHtml(path2To1) + '</div>';
          }
          html += '</div>';
        }

        const upsetOpp1 = [];
        const upsetOpp2 = [];
        
        playersList.forEach(name => {
          if (name === p1 || name === p2) return;
          const r1 = dbH2H[p1]?.[name];
          const r2 = dbH2H[p2]?.[name];
          if (r1 && r1.setWins > 0 && r2 && r2.setLosses > 0) {
            upsetOpp1.push({ opp: name, winRec: r1, lossRec: r2 });
          }
          if (r2 && r2.setWins > 0 && r1 && r1.setLosses > 0) {
            upsetOpp2.push({ opp: name, winRec: r2, lossRec: r1 });
          }
        });

        if (upsetOpp1.length > 0 || upsetOpp2.length > 0) {
          html += '<div class="compare-card-section">';
          html += '<h3>Upset & Loss Comparisons</h3>';
          
          if (upsetOpp1.length > 0) {
            html += '<div style="font-size: 0.75rem; font-weight: bold; color: #16a34a; margin-bottom: 0.3rem;">Opponents ' + p1 + ' beat, but ' + p2 + ' lost to:</div>';
            html += '<div style="margin-bottom: 1rem; padding: 0.5rem; background-color: #f9f9f9; border: 1px solid #dddddd;">';
            upsetOpp1.forEach(item => {
              html += '<div class="upset-row">';
              html += '<span class="upset-opp">' + item.opp + '</span>';
              html += '<div>';
              html += '<span style="color: #16a34a; margin-right: 1rem;">' + p1 + ' won (' + item.winRec.setWins + '-' + item.winRec.setLosses + ')</span>';
              html += '<span style="color: #991b1b;">' + p2 + ' lost (' + item.lossRec.setWins + '-' + item.lossRec.setLosses + ')</span>';
              html += '</div></div>';
            });
            html += '</div>';
          }
          if (upsetOpp2.length > 0) {
            html += '<div style="font-size: 0.75rem; font-weight: bold; color: #16a34a; margin-bottom: 0.3rem;">Opponents ' + p2 + ' beat, but ' + p1 + ' lost to:</div>';
            html += '<div style="padding: 0.5rem; background-color: #f9f9f9; border: 1px solid #dddddd;">';
            upsetOpp2.forEach(item => {
              html += '<div class="upset-row">';
              html += '<span class="upset-opp">' + item.opp + '</span>';
              html += '<div>';
              html += '<span style="color: #16a34a; margin-right: 1rem;">' + p2 + ' won (' + item.winRec.setWins + '-' + item.winRec.setLosses + ')</span>';
              html += '<span style="color: #991b1b;">' + p1 + ' lost (' + item.lossRec.setWins + '-' + item.lossRec.setLosses + ')</span>';
              html += '</div></div>';
            });
            html += '</div>';
          }
          html += '</div>';
        }

        const commonOpps = playersList.filter(name => {
          if (name === p1 || name === p2) return false;
          const r1 = dbH2H[p1]?.[name];
          const r2 = dbH2H[p2]?.[name];
          return r1 && (r1.setWins > 0 || r1.setLosses > 0) && r2 && (r2.setWins > 0 || r2.setLosses > 0);
        });

        html += '<div class="compare-card-section">';
        html += '<h3>Common Opponents</h3>';
        if (commonOpps.length === 0) {
          html += '<div style="color: #666666; font-size: 0.8rem; text-align: center; padding: 1rem;">No common opponents found.</div>';
        } else {
          html += '<div style="overflow-x: auto;">';
          html += '<table class="common-opponents-table">';
          html += '<thead><tr><th>Opponent</th><th>' + p1 + ' Record</th><th>' + p2 + ' Record</th></tr></thead>';
          html += '<tbody>';
          commonOpps.forEach(name => {
            const r1 = dbH2H[p1][name];
            const r2 = dbH2H[p2][name];
            const diff1 = r1.setWins - r1.setLosses;
            const diff2 = r2.setWins - r2.setLosses;
            
            const color1 = diff1 > 0 ? '#16a34a' : diff1 < 0 ? '#991b1b' : '#666666';
            const color2 = diff2 > 0 ? '#16a34a' : diff2 < 0 ? '#991b1b' : '#666666';

            html += '<tr>';
            html += '<td style="font-weight: bold; color: #111111;">' + name + '</td>';
            html += '<td style="color: ' + color1 + '; font-weight: bold;">' + r1.setWins + ' - ' + r1.setLosses + '</td>';
            html += '<td style="color: ' + color2 + '; font-weight: bold;">' + r2.setWins + ' - ' + r2.setLosses + '</td>';
            html += '</tr>';
          });
          html += '</tbody></table></div>';
        }
        html += '</div>';
      }

      html += '<div class="compare-card-section">';
      html += '<h3>Tournament Histories</h3>';
      html += '<div style="display: flex; flex-direction: column; gap: 0.5rem;" id="compareTreesContainer"></div>';
      html += '</div>';

      container.innerHTML = html;
      renderCompareTrees(comparePlayers);
    }

    function renderCompareTrees(comparePlayers) {
      const container = document.getElementById("compareTreesContainer");
      if (!container) return;
      container.innerHTML = "";

      let html = "";
      comparePlayers.forEach((name, cIdx) => {
        const p = dbProfiles[name];
        html += '<div class="tournament-card" id="comp-player-card-' + cIdx + '">';
        html += '<button class="tournament-header" onclick="toggleComparePlayerTree(' + cIdx + ')" style="background-color: #f3f4f6;">';
        html += '<span>' + name + ' History</span>';
        html += '<span class="placement-badge" id="comp-player-badge-' + cIdx + '">[+] Expand</span>';
        html += '</button>';
        html += '<div class="tournament-body" id="comp-player-body-' + cIdx + '" style="display: none; padding: 0.75rem; background-color: #fafafa;">';

        p.tournaments.forEach((t, tIdx) => {
          html += '<div class="tournament-card" id="comp-t-card-' + cIdx + '-' + tIdx + '" style="margin-bottom: 0.4rem; border-color: #dddddd;">';
          html += '<button class="tournament-header" onclick="toggleCompareTournament(' + cIdx + ',' + tIdx + ')" style="padding: 0.5rem 0.75rem; font-size: 0.8rem; background-color: #ffffff;">';
          html += '<span><a href="' + t.url + '" target="_blank" onclick="event.stopPropagation()" style="color: #0055aa; text-decoration: underline;">' + t.tournamentName + '</a></span>';
          html += '<div class="tournament-meta">';
          html += '<span>Record: ' + t.record + '</span>';
          html += '<span class="placement-badge">' + t.placement + '</span>';
          html += '</div>';
          html += '</button>';
          html += '<div class="tournament-body" id="comp-t-body-' + cIdx + '-' + tIdx + '" style="display: none; background-color: #ffffff;">';

          t.sets.forEach(s => {
            const resClass = s.isWin ? 'win' : 'loss';
            const scoreDisplay = s.isDQ ? '(DQ)' : '(' + getCleanScore(s.score, name, s.isWin) + ')';
            html += '<div class="match-row" style="padding: 0.4rem 0.75rem;">';
            html += '<div class="match-result">';
            html += '<span class="result-indicator ' + resClass + '" style="font-size: 0.6rem; width: 38px; padding: 0.05rem 0.2rem;">' + (s.isWin ? 'win' : 'loss') + '</span>';
            html += '<div>';
            html += '<span class="opponent-name" style="font-size: 0.75rem;">vs ' + s.oppName + '</span>';
            html += '<span class="score-text" style="font-size: 0.7rem;">' + scoreDisplay + '</span>';
            if (s.char) {
              html += '<div class="character-text" style="font-size: 0.65rem;">' + s.char + '</div>';
            }
            html += '</div>';
            html += '</div>';
            html += '<div class="match-round" style="font-size: 0.7rem;">' + s.round + '</div>';
            html += '</div>';
          });

          html += '</div>';
          html += '</div>';
        });

        html += '</div>';
        html += '</div>';
      });

      container.innerHTML = html;
    }

    function toggleComparePlayerTree(cIdx) {
      const el = document.getElementById("comp-player-body-" + cIdx);
      const badge = document.getElementById("comp-player-badge-" + cIdx);
      if (el) {
        const isHidden = el.style.display === "none";
        el.style.display = isHidden ? "block" : "none";
        if (badge) badge.innerText = isHidden ? "[-] Collapse" : "[+] Expand";
      }
    }

    function toggleCompareTournament(cIdx, tIdx) {
      const el = document.getElementById("comp-t-body-" + cIdx + "-" + tIdx);
      if (el) {
        const isHidden = el.style.display === "none";
        el.style.display = isHidden ? "block" : "none";
      }
    }

    function getBestWins(pId) {
      const list = [];
      Object.entries(dbH2H[pId] || {}).forEach(([oppId, rec]) => {
        if (rec.setWins > 0) {
          const rank = playersList.indexOf(oppId);
          if (rank !== -1) list.push({ name: oppId, rank: rank });
        }
      });
      return list.sort((a,b) => a.rank - b.rank).slice(0, 3).map(x => x.name);
    }

    function getWorstLosses(pId) {
      const list = [];
      Object.entries(dbH2H[pId] || {}).forEach(([oppId, rec]) => {
        if (rec.setLosses > 0) {
          const rank = playersList.indexOf(oppId);
          if (rank !== -1) list.push({ name: oppId, rank: rank });
        }
      });
      return list.sort((a,b) => b.rank - a.rank).slice(0, 3).map(x => x.name);
    }

    function findShortestWinPath(startId, endId) {
      const queue = [[startId]];
      const visited = new Set([startId]);

      while (queue.length > 0) {
        const path = queue.shift();
        const node = path[path.length - 1];
        if (node === endId) return path;

        const opps = dbH2H[node] || {};
        for (const oppId in opps) {
          if (opps[oppId].setWins > 0 && !visited.has(oppId)) {
            visited.add(oppId);
            queue.push([...path, oppId]);
          }
        }
      }
      return null;
    }

    function formatPathHtml(pathArr) {
      return pathArr.map((id, idx) => {
        if (idx === pathArr.length - 1) {
          return '<span class="path-step">' + id + '</span>';
        }
        const nextId = pathArr[idx + 1];
        const rec = dbH2H[id]?.[nextId] || { setWins: 0, setLosses: 0 };
        return '<span class="path-step">' + id + '</span> <span class="path-arrow">beat (' + rec.setWins + '-' + rec.setLosses + ') →</span>';
      }).join(" ");
    }

    window.onload = init;
  </script>
</body>
